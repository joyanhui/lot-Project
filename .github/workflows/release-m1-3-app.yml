name: Release M1-3 App

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "lot-manager-aio ref to build"
        required: false
        default: "main"
      release_tag:
        description: "Release tag/name"
        required: false
        default: "m1-3-app-manual"
      prerelease:
        description: "Mark release as prerelease"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

concurrency:
  group: release-m1-3-app-${{ github.event.inputs.release_tag }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Desktop: Linux
  # ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}
    steps:
      - name: Checkout lot-Project
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install workspace dependencies
        working-directory: workspace
        shell: bash
        run: bun install

      - name: Build frontend for tauri
        working-directory: workspace/m1-1-platform/frontend
        shell: bash
        run: bun run build:tauri

      - name: Build Tauri app
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          bunx tauri build --bundles deb
          bunx tauri build --bundles appimage

      - name: Collect artifacts
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          find workspace/m1-3-app/src-tauri/target/release/bundle -name '*.deb' -exec cp {} /tmp/release/ \;
          find workspace/m1-3-app/src-tauri/target/release/bundle -name '*.AppImage' -exec cp {} /tmp/release/ \;
          find workspace/m1-3-app/src-tauri/target/release/bundle -name '*.AppImage.tar.gz' -exec cp {} /tmp/release/ \;
          ls -la /tmp/release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-linux
          path: /tmp/release/*
          if-no-files-found: warn

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: false
          files: /tmp/release/*

  # ──────────────────────────────────────────────
  # Desktop: Windows
  # ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}
    steps:
      - name: Checkout lot-Project
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install workspace dependencies
        working-directory: workspace
        shell: bash
        run: bun install

      - name: Build frontend for tauri
        working-directory: workspace/m1-1-platform/frontend
        shell: bash
        run: bun run build:tauri

      - name: Build Tauri app
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          bunx tauri build --bundles msi

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          find workspace/m1-3-app/src-tauri/target/release/bundle -name '*.msi' -exec cp {} /tmp/release/ \;
          ls -la /tmp/release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-windows
          path: /tmp/release/*
          if-no-files-found: warn

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: false
          files: /tmp/release/*

  # ──────────────────────────────────────────────
  # Desktop: macOS
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}
    steps:
      - name: Checkout lot-Project
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install workspace dependencies
        working-directory: workspace
        shell: bash
        run: bun install

      - name: Build frontend for tauri
        working-directory: workspace/m1-1-platform/frontend
        shell: bash
        run: bun run build:tauri

      - name: Build Tauri app
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          bunx tauri build --bundles dmg

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          find workspace/m1-3-app/src-tauri/target/release/bundle -name '*.dmg' -exec cp {} /tmp/release/ \;
          ls -la /tmp/release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-macos
          path: /tmp/release/*
          if-no-files-found: warn

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: false
          files: /tmp/release/*

  # ──────────────────────────────────────────────
  # Android
  # ──────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}
    steps:
      - name: Checkout lot-Project
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android targets
        shell: bash
        run: |
          set -euo pipefail
          rustup target add aarch64-linux-android x86_64-linux-android armv7-linux-androideabi
          cargo install tauri-cli --version "^2" || true

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install "ndk;27.0.12077973" --channel=0
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Install workspace dependencies
        working-directory: workspace
        shell: bash
        run: bun install

      - name: Build frontend for tauri
        working-directory: workspace/m1-1-platform/frontend
        shell: bash
        run: bun run build:tauri

      - name: Initialize Android project
        working-directory: workspace/m1-3-app
        shell: bash
        run: bunx tauri android init --ci --skip-targets-install

      - name: Copy bridge templates & configure signing
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          bun run scripts/copy-mobile-bridges.ts android
          bun run scripts/configure-android-signing.ts

      - name: Build Android APK
        working-directory: workspace/m1-3-app
        shell: bash
        run: bunx tauri android build --target aarch64 --apk

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          find workspace/m1-3-app/src-tauri/gen/android -name '*.apk' -exec cp {} /tmp/release/ \;
          ls -la /tmp/release/ || echo "No APK found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-android
          path: /tmp/release/*.apk
          if-no-files-found: warn

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: false
          files: /tmp/release/*.apk

  # ──────────────────────────────────────────────
  # iOS
  # ──────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}
      IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
      IOS_EXPORT_OPTIONS_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_BASE64 }}
      IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }}
    steps:
      - name: Checkout lot-Project
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Apple targets
        shell: bash
        run: |
          set -euo pipefail
          rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Install workspace dependencies
        working-directory: workspace
        shell: bash
        run: bun install

      - name: Build shared frontend for tauri
        working-directory: workspace/m1-1-platform/frontend
        shell: bash
        run: bun run build:tauri

      - name: Initialize iOS project
        working-directory: workspace/m1-3-app
        shell: bash
        run: bunx tauri ios init --ci --skip-targets-install

      - name: Copy bridge templates to iOS project
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          bun run scripts/copy-mobile-bridges.ts ios

      - name: Detect iOS signing availability
        id: ios_signing
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${IOS_CERTIFICATE_P12_BASE64}" ] && [ -n "${IOS_CERTIFICATE_PASSWORD}" ] && [ -n "${IOS_PROVISIONING_PROFILE_BASE64}" ] && [ -n "${IOS_KEYCHAIN_PASSWORD}" ] && [ -n "${IOS_TEAM_ID}" ] && [ -n "${IOS_BUNDLE_IDENTIFIER}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare iOS signing assets
        if: steps.ios_signing.outputs.enabled == 'true'
        shell: bash
        working-directory: workspace/m1-3-app
        run: |
          set -euo pipefail
          mkdir -p /tmp/m1-3-ios-signing /tmp/m1-3-app-ios-build /tmp/release
          security create-keychain -p "${IOS_KEYCHAIN_PASSWORD}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${IOS_KEYCHAIN_PASSWORD}" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          printf '%s' "${IOS_CERTIFICATE_P12_BASE64}" | base64 --decode > /tmp/m1-3-ios-signing/certificate.p12
          security import /tmp/m1-3-ios-signing/certificate.p12 -k build.keychain -P "${IOS_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "${IOS_KEYCHAIN_PASSWORD}" build.keychain
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          printf '%s' "${IOS_PROVISIONING_PROFILE_BASE64}" | base64 --decode > /tmp/m1-3-ios-signing/profile.mobileprovision
          cp /tmp/m1-3-ios-signing/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/m1-3-app.mobileprovision"
          if [ -n "${IOS_EXPORT_OPTIONS_BASE64}" ]; then
            printf '%s' "${IOS_EXPORT_OPTIONS_BASE64}" | base64 --decode > /tmp/m1-3-ios-signing/ExportOptions.plist
          else
            cp signing/ios/ExportOptions.plist /tmp/m1-3-ios-signing/ExportOptions.plist
          fi
          /usr/libexec/PlistBuddy -c "Set :teamID ${IOS_TEAM_ID}" /tmp/m1-3-ios-signing/ExportOptions.plist || /usr/libexec/PlistBuddy -c "Add :teamID string ${IOS_TEAM_ID}" /tmp/m1-3-ios-signing/ExportOptions.plist

      - name: Build signed iOS IPA with Tauri CLI
        if: steps.ios_signing.outputs.enabled == 'true'
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          export_method="${IOS_EXPORT_METHOD:-release-testing}"
          bunx tauri ios build --ci --export-method "${export_method}"
          find src-tauri/gen/apple/build -name '*.ipa' -exec cp {} /tmp/release/ \;
          ls -la /tmp/release/

      - name: Build unsigned simulator app with Tauri CLI
        if: steps.ios_signing.outputs.enabled != 'true'
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          bunx tauri ios build --target aarch64-sim --ci

      - name: Package simulator app bundle
        if: steps.ios_signing.outputs.enabled != 'true'
        id: package
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find workspace/m1-3-app/src-tauri/gen/apple/build/Products/Release-iphonesimulator -type d -name '*.app' | head -1)"
          test -n "${app_path}"
          mkdir -p /tmp/release
          cp -R "${app_path}" /tmp/release/
          app_name="$(basename "${app_path}")"
          base_name="${app_name%.app}"
          ditto -c -k --keepParent "${app_path}" "/tmp/release/${base_name}-ios-simulator.app.zip"
          echo "app_path=${app_path}" >> "$GITHUB_OUTPUT"
          echo "zip_path=/tmp/release/${base_name}-ios-simulator.app.zip" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-ios
          path: |
            /tmp/release/*.app
            /tmp/release/*-ios-simulator.app.zip
            /tmp/release/*.ipa
          if-no-files-found: error

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: false
          files: |
            /tmp/release/*-ios-simulator.app.zip
            /tmp/release/*.ipa
