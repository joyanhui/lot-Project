name: CI M1-2 Device Init Reg Proxy

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "要校验的 lot-manager-aio ref（分支 / tag / commit SHA）"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: ci-m1-2-device-init-reg-proxy-${{ github.event.inputs.source_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
    steps:
      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch private workspace to requested ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check proxy crate
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          cargo check -p m1-2-device-init-reg-proxy

      - name: Run proxy tests
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p m1-2-device-init-reg-proxy
