name: Release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "lot-manager-aio ref to build"
        required: false
        default: "main"
      release_tag:
        description: "Release tag/name"
        required: false
        default: "manual-release"
      prerelease:
        description: "Mark release as prerelease"
        type: boolean
        required: false
        default: true
      publish_release:
        description: "Publish GitHub Release after build"
        type: boolean
        required: false
        default: false
      build_target:
        description: "What to build"
        type: choice
        required: false
        default: "all"
        options:
          - all
          - m1-3-app
          - m1-3-app-android
          - m1-3-app-desktop
          - m2-1-listener-linux-x86_64
          - m2-2-saver-linux-x86_64
          - m3-v1-esp32c3-classicsimple-firmware
          - esp32c3-firmware

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.release_tag }}
  cancel-in-progress: true

jobs:
  build-linux:
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'm1-3-app' || github.event.inputs.build_target == 'm1-3-app-desktop' || github.event.inputs.build_target == '' }}
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch private workspace to requested ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install workspace dependencies
        working-directory: workspace
        shell: bash
        run: bun install

      - name: Build frontend for tauri
        working-directory: workspace/frontend
        shell: bash
        run: bun run build:tauri

      - name: Build Tauri app
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          cargo install tauri-cli --version "^2" --locked || true
          cargo tauri build --bundles deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-linux
          path: |
            workspace/target/release/bundle/**/*.deb
          if-no-files-found: warn

  build-windows:
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'm1-3-app' || github.event.inputs.build_target == 'm1-3-app-desktop' || github.event.inputs.build_target == '' }}
    runs-on: windows-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch private workspace to requested ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install workspace dependencies
        working-directory: workspace
        shell: bash
        run: bun install

      - name: Build frontend for tauri
        working-directory: workspace/frontend
        shell: bash
        run: bun run build:tauri

      - name: Build Tauri app
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          cargo install tauri-cli --version "^2" --locked || true
          cargo tauri build --bundles msi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-windows
          path: |
            workspace/target/release/bundle/**/*.msi
          if-no-files-found: warn

  build-macos:
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'm1-3-app' || github.event.inputs.build_target == 'm1-3-app-desktop' || github.event.inputs.build_target == '' }}
    runs-on: macos-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch private workspace to requested ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Apple targets
        shell: bash
        run: rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Install workspace dependencies
        working-directory: workspace
        shell: bash
        run: bun install

      - name: Build frontend for tauri
        working-directory: workspace/frontend
        shell: bash
        run: bun run build:tauri

      - name: Build macOS DMG
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          cargo install tauri-cli --version "^2" --locked || true
          cargo tauri build --bundles dmg

      - name: Initialize iOS project
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          cargo install tauri-cli --version "^2" --locked || true
          cargo tauri ios init --ci --skip-targets-install

      - name: Copy bridge templates to iOS project
        working-directory: workspace/m1-3-app
        shell: bash
        run: python3 ../script/m1-3/copy-mobile-bridges.py ios

      - name: Build unsigned iOS simulator app
        working-directory: workspace/m1-3-app
        shell: bash
        run: cargo tauri ios build --target aarch64-sim --ci

      - name: Package iOS simulator app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          app_path="$(find workspace/m1-3-app/gen/apple/build/Products/Release-iphonesimulator -type d -name '*.app' | head -1)"
          test -n "${app_path}"
          cp -R "${app_path}" /tmp/release/
          app_name="$(basename "${app_path}")"
          base_name="${app_name%.app}"
          ditto -c -k --keepParent "${app_path}" "/tmp/release/${base_name}-ios-simulator.app.zip"

      - name: Upload macOS/iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-apple
          path: |
            workspace/target/release/bundle/**/*.dmg
            /tmp/release/*-ios-simulator.app.zip
          if-no-files-found: warn

  build-android:
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'm1-3-app' || github.event.inputs.build_target == 'm1-3-app-android' || github.event.inputs.build_target == '' }}
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch private workspace to requested ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android targets
        shell: bash
        run: |
          set -euo pipefail
          rustup target add aarch64-linux-android x86_64-linux-android armv7-linux-androideabi
          cargo install tauri-cli --version "^2" --locked || true

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install "ndk;27.0.12077973" --channel=0
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Install workspace dependencies
        working-directory: workspace
        shell: bash
        run: bun install

      - name: Build frontend for tauri
        working-directory: workspace/frontend
        shell: bash
        run: bun run build:tauri

      - name: Initialize Android project
        working-directory: workspace/m1-3-app
        shell: bash
        run: cargo tauri android init --ci --skip-targets-install

      - name: Copy bridge templates & configure signing
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          python3 ../script/m1-3/copy-mobile-bridges.py android
          python3 ../script/m1-3/configure-android-signing.py

      - name: Build Android APK
        working-directory: workspace/m1-3-app
        shell: bash
        run: cargo tauri android build --target aarch64 --apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-android
          path: workspace/m1-3-app/gen/android/**/*.apk
          if-no-files-found: warn

  build-m2-1-listener-linux-x86_64:
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'm2-1-listener-linux-x86_64' || github.event.inputs.build_target == '' }}
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
      OUTPUT_NAME: m2-1-listener-x86_64-unknown-linux-gnu
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch private workspace to requested ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build m2-1-listener
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release -p m2-1-listener --target "${TARGET_TRIPLE}"

      - name: Collect m2-1-listener artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          binary_path="workspace/target/${TARGET_TRIPLE}/release/m2-1-listener"
          test -f "${binary_path}"
          cp "${binary_path}" "/tmp/release/${OUTPUT_NAME}"
          sha256sum "/tmp/release/${OUTPUT_NAME}" | tee "/tmp/release/${OUTPUT_NAME}.sha256"

      - name: Upload m2-1-listener artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m2-1-listener-linux-x86_64
          path: /tmp/release/${{ env.OUTPUT_NAME }}*
          if-no-files-found: error

  build-m2-2-saver-linux-x86_64:
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'm2-2-saver-linux-x86_64' || github.event.inputs.build_target == '' }}
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
      OUTPUT_NAME: m2-2-saver-x86_64-unknown-linux-gnu
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch private workspace to requested ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build m2-2-saver
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release -p m2-2-saver --target "${TARGET_TRIPLE}"

      - name: Collect m2-2-saver artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          binary_path="workspace/target/${TARGET_TRIPLE}/release/m2-2-saver"
          test -f "${binary_path}"
          cp "${binary_path}" "/tmp/release/${OUTPUT_NAME}"
          sha256sum "/tmp/release/${OUTPUT_NAME}" | tee "/tmp/release/${OUTPUT_NAME}.sha256"

      - name: Upload m2-2-saver artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m2-2-saver-linux-x86_64
          path: /tmp/release/${{ env.OUTPUT_NAME }}*
          if-no-files-found: error

  build-esp32c3-firmware:
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'esp32c3-firmware' || github.event.inputs.build_target == 'm3-v1-esp32c3-classicsimple-firmware' || github.event.inputs.build_target == '' }}
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
      OUTPUT_NAME: m3-v1-esp32c3-classicsimple-firmware-riscv32imc-esp-espidf.elf
      ESP_IDF_VERSION: v5.2.2
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch private workspace to requested ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install ESP-IDF system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git \
            wget \
            flex \
            bison \
            gperf \
            python3 \
            python3-pip \
            python3-venv \
            cmake \
            ninja-build \
            ccache \
            libffi-dev \
            libssl-dev \
            dfu-util \
            libusb-1.0-0

      - name: Prepare firmware config
        working-directory: workspace/m3-v1
        shell: bash
        run: |
          set -euo pipefail
          cp config.toml.example config.toml
          bash ../script/prepare-m3-sdkconfig.sh

      - name: Build firmware ELF
        working-directory: workspace/m3-v1
        shell: bash
        run: |
          set -euo pipefail
          env -u RUSTFLAGS -u CARGO_ENCODED_RUSTFLAGS cargo +nightly build -Zbuild-std=std,panic_abort --release --bin lot-manager-m3-firmware-esp32c3 --target riscv32imc-esp-espidf

      - name: Collect firmware artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          firmware_path="workspace/target/riscv32imc-esp-espidf/release/lot-manager-m3-firmware-esp32c3"
          if [[ ! -f "${firmware_path}" ]]; then
            firmware_path="workspace/m3-v1/target/riscv32imc-esp-espidf/release/lot-manager-m3-firmware-esp32c3"
          fi
          test -f "${firmware_path}"
          cp "${firmware_path}" "/tmp/release/${OUTPUT_NAME}"
          cp workspace/m3-v1/config.toml.example /tmp/release/
          cp workspace/m3-v1/sdkconfig.defaults /tmp/release/
          cp workspace/m3-v1/partitions.csv /tmp/release/
          sha256sum "/tmp/release/${OUTPUT_NAME}" | tee "/tmp/release/${OUTPUT_NAME}.sha256"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32c3-firmware
          path: /tmp/release/*
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-android
      - build-m2-1-listener-linux-x86_64
      - build-m2-2-saver-linux-x86_64
      - build-esp32c3-firmware
    if: always() && github.event.inputs.publish_release != 'false' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/release-artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/final-release
          find /tmp/release-artifacts -type f -exec cp {} /tmp/final-release/ \;
          ls -la /tmp/final-release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: false
          files: /tmp/final-release/*
