          cp sdkconfig.defaults sdkconfig
          env \
            -u RUSTFLAGS \
            -u CARGO_ENCODED_RUSTFLAGS \
            -u CARGO_PROFILE_DEV_SPLIT_DEBUGINFO \
            -u CARGO_PROFILE_RELEASE_SPLIT_DEBUGINFO \
            ESP_IDF_SDKCONFIG="$PWD/sdkconfig" \
            ESP_IDF_SDKCONFIG_DEFAULTS="$PWD/sdkconfig.defaults" \
            ESP_IDF_TOOLS_INSTALL_DIR="custom:$PWD/.embuild/espressif" \
            cargo +nightly build \
              -Zbuild-std=std,panic_abort \
              --release \
              --package lot-manager-m3-firmware \
              --bin lot-manager-m3-firmware-esp32c3 \
              --features esp32c3 \
              --target riscv32imc-esp-espidf

      - name: Collect m3-v1 esp32c3-classicsimple firmware artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          firmware_path="workspace/target/riscv32imc-esp-espidf/release/lot-manager-m3-firmware-esp32c3"
          if [[ ! -f "${firmware_path}" ]]; then
            firmware_path="workspace/m3-v1/target/riscv32imc-esp-espidf/release/lot-manager-m3-firmware-esp32c3"
          fi
          test -f "${firmware_path}"
          partition_table_path="workspace/target/riscv32imc-esp-espidf/release/partition-table.bin"
          if [[ ! -f "${partition_table_path}" ]]; then
            partition_table_path="workspace/m3-v1/target/riscv32imc-esp-espidf/release/partition-table.bin"
          fi
          test -f "${partition_table_path}"
          bootloader_path="workspace/target/riscv32imc-esp-espidf/release/bootloader.bin"
          if [[ ! -f "${bootloader_path}" ]]; then
            bootloader_path="workspace/m3-v1/target/riscv32imc-esp-espidf/release/bootloader.bin"
          fi
          test -f "${bootloader_path}"
          cp "${firmware_path}" "/tmp/release/${OUTPUT_NAME}"
          cp "${partition_table_path}" /tmp/release/partition-table.bin
          cp "${bootloader_path}" /tmp/release/bootloader.bin
          cp workspace/m3-v1/config.toml.example /tmp/release/
          cp workspace/m3-v1/sdkconfig.defaults /tmp/release/
          cp workspace/m3-v1/partitions.csv /tmp/release/
          sha256sum "/tmp/release/${OUTPUT_NAME}" | tee "/tmp/release/${OUTPUT_NAME}.sha256"
          sha256sum /tmp/release/partition-table.bin | tee /tmp/release/partition-table.bin.sha256
          sha256sum /tmp/release/bootloader.bin | tee /tmp/release/bootloader.bin.sha256

      - name: Upload m3-v1 esp32c3-classicsimple firmware artifacts to private release
        if: ${{ github.event.inputs.publish_release != 'false' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GH }}
        run: |
          set -euo pipefail
          release_tag="${{ github.event.inputs.release_tag }}"
          if ! gh release view "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" >/dev/null 2>&1; then
            if [[ "${{ github.event.inputs.prerelease }}" == 'true' ]]; then
              gh release create "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" --title "${release_tag}" --prerelease --notes ""
            else
              gh release create "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" --title "${release_tag}" --notes ""
            fi
          fi
          gh release upload "${release_tag}" /tmp/release/* -R "${PRIVATE_RELEASE_REPO}" --clobber

  publish-release:
    name: Publish collected public release artifacts
    runs-on: ubuntu-latest
    needs:
      - prepare-private-release
      - build-linux
      - build-windows
      - build-macos
      - build-android
      - prepare-shared-frontend-assets
      - build-m1-1-platform-linux-x86_64
      - build-m1-2-device-init-reg-proxy-linux-x86_64
      - build-m1-2-device-init-reg-proxy-linux-armv8
      - build-m2-1-listener-linux-x86_64
      - build-m2-1-listener-linux-armv8
      - build-m2-2-saver-linux-x86_64
      - build-m2-2-saver-linux-armv8
      - build-esp32c3-firmware
    if: always() && github.event.inputs.publish_public_release == 'true' && (github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'm1-3-app' || github.event.inputs.build_target == 'm1-3-app-android' || github.event.inputs.build_target == 'm1-3-app-desktop' || github.event.inputs.build_target == '') && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    steps:
      - name: Download all collected artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/release-artifacts

      - name: Flatten collected release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/final-release
          find /tmp/release-artifacts -type f -exec cp {} /tmp/final-release/ \;
          ls -la /tmp/final-release

      - name: Publish GitHub release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: false
          files: /tmp/final-release/*
