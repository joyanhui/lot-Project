    needs:
      - prepare-private-release
      - build-m1-1-platform-rs-linux-x86_64
      - build-m2-1-listener-linux-x86_64
      - build-m2-2-telemetry-tracking-and-archive-linux-x86_64
      - build-m4-1-inlet-manager-linux-x86_64
      - build-m4-2-device-init-reg-proxy-linux-x86_64
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      OUTPUT_NAME: lot-manager-aio-x86_64-gnu-docker.tar.gz
    steps:
      - name: Checkout lot-Project repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout lot-manager-aio workspace for Docker context
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Download m1-1-platform-rs binary and frontend assets
        uses: actions/download-artifact@v4
        with:
          name: binary-m1-1-platform-rs-x86_64
          path: /tmp/docker-artifacts

      - name: Download m2-1-listener binary
        uses: actions/download-artifact@v4
        with:
          name: binary-m2-1-listener-x86_64
          path: /tmp/docker-artifacts

      - name: Download m2-2-telemetry-tracking-and-archive binary
        uses: actions/download-artifact@v4
        with:
          name: binary-m2-2-telemetry-tracking-and-archive-x86_64
          path: /tmp/docker-artifacts

      - name: Download m4-1-inlet-manager binary
        uses: actions/download-artifact@v4
        with:
          name: binary-m4-1-inlet-manager-x86_64
          path: /tmp/docker-artifacts

      - name: Download m4-2-device-init-reg-proxy binary
        uses: actions/download-artifact@v4
        with:
          name: binary-m4-2-device-init-reg-proxy-x86_64
          path: /tmp/docker-artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Docker build context and build image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/docker-context/usr/local/bin /tmp/docker-context/frontend/dist-cli

          tar_dir="$(mktemp -d)"
          tar xzf /tmp/docker-artifacts/m1-1-platform-rs-linux-x86_64.tar.gz -C "${tar_dir}"
          mv "${tar_dir}/m1-1-platform-rs" /tmp/docker-context/usr/local/bin/
          cp -r "${tar_dir}/public"/* /tmp/docker-context/frontend/dist-cli/
          rm -rf "${tar_dir}"

          for f in /tmp/docker-artifacts/*.gz; do
            base="$(basename "$f" .gz)"
            case "$base" in
              m1-1-platform-rs-linux-x86_64.tar) continue ;;
            esac
            gunzip -c "$f" > "/tmp/docker-context/usr/local/bin/${base}"
            chmod +x "/tmp/docker-context/usr/local/bin/${base}"
          done

          chmod +x /tmp/docker-context/usr/local/bin/*

          mkdir -p /tmp/release
          docker buildx build \
            --platform linux/amd64 \
            --output type=docker,dest=/tmp/release/lot-manager-aio-x86_64-gnu-docker.tar \
            -f workspace/script/ci/docker/Dockerfile.lot-manager-aio.debian \
            /tmp/docker-context

          gzip -c /tmp/release/lot-manager-aio-x86_64-gnu-docker.tar > "/tmp/release/${OUTPUT_NAME}"
          rm -f /tmp/release/lot-manager-aio-x86_64-gnu-docker.tar

