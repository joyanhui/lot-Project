name: Release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "lot-manager-aio ref to build"
        required: false
        default: "main"
      release_tag:
        description: "Release tag/name"
        required: false
        default: "manual-release"
      prerelease:
        description: "Mark release as prerelease"
        type: boolean
        required: false
        default: true
      publish_release:
        description: "Publish private GitHub Release after build"
        type: boolean
        required: false
        default: false
      publish_public_release:
        description: "Publish public GitHub Release on lot-Project after build"
        type: boolean
        required: false
        default: false
      build_target:
        description: "What to build"
        type: choice
        required: false
        default: "all"
        options:
          - all
          - m1-1-platform-linux
          - m1-1-platform-linux-x86_64
          - m1-3-app
          - m1-3-app-android
          - m1-3-app-desktop
          - m1-2-device-init-reg-proxy-linux
          - m1-2-device-init-reg-proxy-linux-x86_64
          - m1-2-device-init-reg-proxy-linux-armv8
          - m2-1-listener-linux
          - m2-1-listener-linux-x86_64
          - m2-1-listener-linux-armv8
          - m2-2-saver-linux
          - m2-2-saver-linux-x86_64
          - m2-2-saver-linux-armv8
          - m3-v1-esp32c3-classicsimple-firmware
          - esp32c3-firmware

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.release_tag }}
  cancel-in-progress: true

env:
  PRIVATE_RELEASE_REPO: joyanhui/lot-manager-aio

jobs:
  prepare-private-release:
    name: Prepare private lot-manager-aio release
    runs-on: ubuntu-latest
    steps:
      - name: Ensure private release exists when publishing
        if: ${{ github.event.inputs.publish_release != 'false' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GH }}
        run: |
          set -euo pipefail
          release_tag="${{ github.event.inputs.release_tag }}"
          if gh release view "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" >/dev/null 2>&1; then
            exit 0
          fi
          if [[ "${{ github.event.inputs.prerelease }}" == 'true' ]]; then
            gh release create "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" --title "${release_tag}" --prerelease --notes "" || gh release view "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" >/dev/null 2>&1
          else
            gh release create "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" --title "${release_tag}" --notes "" || gh release view "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" >/dev/null 2>&1
          fi

  prepare-shared-frontend-assets:
    name: Build shared frontend assets for m1-1-platform and m1-3-app
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'm1-1-platform-linux' || github.event.inputs.build_target == 'm1-1-platform-linux-x86_64' || github.event.inputs.build_target == 'm1-3-app' || github.event.inputs.build_target == 'm1-3-app-android' || github.event.inputs.build_target == 'm1-3-app-desktop' || github.event.inputs.build_target == '' }}
    needs: prepare-private-release
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
    steps:
      - name: Checkout lot-manager-aio workspace for shared frontend assets
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch shared frontend workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Bun for shared frontend assets
        uses: oven-sh/setup-bun@v2

      - name: Install workspace dependencies for shared frontend assets
        working-directory: workspace
        shell: bash
        run: bun install

      - name: Build shared frontend web assets for m1-1-platform
        working-directory: workspace/frontend
        shell: bash
        run: bun run build:web

      - name: Build shared frontend tauri assets for m1-3-app
        working-directory: workspace/frontend
        shell: bash
        run: bun run build:tauri

      - name: Upload shared frontend web assets for m1-1-platform
        uses: actions/upload-artifact@v4
        with:
          name: frontend-web-public
          path: workspace/m1-1-platform/public
          if-no-files-found: error

      - name: Upload shared frontend tauri assets for m1-3-app
        uses: actions/upload-artifact@v4
        with:
          name: frontend-tauri-dist
          path: workspace/m1-3-app/dist
          if-no-files-found: error

  build-linux:
    name: Build m1-3-app Linux x86_64 binary
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'm1-3-app' || github.event.inputs.build_target == 'm1-3-app-desktop' || github.event.inputs.build_target == '' }}
    needs:
      - prepare-private-release
      - prepare-shared-frontend-assets
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
    steps:
      - name: Checkout lot-Project repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout lot-manager-aio workspace for m1-3-app Linux
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch m1-3-app Linux workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Install Linux system dependencies for m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust for m1-3-app Linux
        uses: dtolnay/rust-toolchain@stable

      - name: Download shared frontend tauri assets for m1-3-app Linux
        uses: actions/download-artifact@v4
        with:
          name: frontend-tauri-dist
          path: workspace/m1-3-app/dist

      - name: Build m1-3-app Linux x86_64 binary
        working-directory: workspace/m1-3-app
        shell: bash
        env:
          LOT_SKIP_FRONTEND_BUILD: "true"
        run: |
          set -euo pipefail
          cargo install tauri-cli --version "^2" --locked || true
          cargo tauri build --no-bundle

      - name: Collect m1-3-app Linux x86_64 binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          binary_path="workspace/target/release/lot-manager-m1-3-app"
          output_name="m1-3-app-x86_64-unknown-linux-gnu"
          test -f "${binary_path}"
          gzip -c "${binary_path}" > "/tmp/release/${output_name}.gz"
          sha256sum "/tmp/release/${output_name}.gz" | tee "/tmp/release/${output_name}.gz.sha256"

      - name: Upload m1-3-app Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-linux
          path: |
            /tmp/release/m1-3-app-x86_64-unknown-linux-gnu.gz
            /tmp/release/m1-3-app-x86_64-unknown-linux-gnu.gz.sha256
          if-no-files-found: warn

      - name: Upload m1-3-app Linux artifacts to private release
        if: ${{ github.event.inputs.publish_release != 'false' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GH }}
        run: |
          set -euo pipefail
          release_tag="${{ github.event.inputs.release_tag }}"
          if ! gh release view "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" >/dev/null 2>&1; then
            if [[ "${{ github.event.inputs.prerelease }}" == 'true' ]]; then
              gh release create "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" --title "${release_tag}" --prerelease --notes ""
            else
              gh release create "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" --title "${release_tag}" --notes ""
            fi
          fi
          gh release upload "${release_tag}" \
            /tmp/release/m1-3-app-x86_64-unknown-linux-gnu.gz \
            /tmp/release/m1-3-app-x86_64-unknown-linux-gnu.gz.sha256 \
            -R "${PRIVATE_RELEASE_REPO}" \
            --clobber

  build-windows:
    name: Build m1-3-app Windows (.msi)
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'm1-3-app' || github.event.inputs.build_target == 'm1-3-app-desktop' || github.event.inputs.build_target == '' }}
    needs:
      - prepare-private-release
      - prepare-shared-frontend-assets
    runs-on: windows-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
    steps:
      - name: Checkout lot-Project repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout lot-manager-aio workspace for m1-3-app Windows
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch m1-3-app Windows workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Rust for m1-3-app Windows
        uses: dtolnay/rust-toolchain@stable

      - name: Download shared frontend tauri assets for m1-3-app Windows
        uses: actions/download-artifact@v4
        with:
          name: frontend-tauri-dist
          path: workspace/m1-3-app/dist

      - name: Build m1-3-app Windows .msi
        working-directory: workspace/m1-3-app
        shell: bash
        env:
          LOT_SKIP_FRONTEND_BUILD: "true"
        run: |
          set -euo pipefail
          cargo install tauri-cli --version "^2" --locked || true
          cargo tauri build --bundles msi

      - name: Upload m1-3-app Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-windows
          path: |
            workspace/target/release/bundle/**/*.msi
          if-no-files-found: warn

      - name: Upload m1-3-app Windows artifacts to private release
        if: ${{ github.event.inputs.publish_release != 'false' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GH }}
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          release_tag="${{ github.event.inputs.release_tag }}"
          files=(workspace/target/release/bundle/**/*.msi)
          ((${#files[@]} > 0))
          if ! gh release view "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" >/dev/null 2>&1; then
            if [[ "${{ github.event.inputs.prerelease }}" == 'true' ]]; then
              gh release create "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" --title "${release_tag}" --prerelease --notes ""
            else
              gh release create "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" --title "${release_tag}" --notes ""
            fi
          fi
          gh release upload "${release_tag}" "${files[@]}" -R "${PRIVATE_RELEASE_REPO}" --clobber

  build-macos:
    name: Build m1-3-app macOS .dmg + iOS simulator .app.ipa
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'm1-3-app' || github.event.inputs.build_target == 'm1-3-app-desktop' || github.event.inputs.build_target == '' }}
    needs:
      - prepare-private-release
      - prepare-shared-frontend-assets
    runs-on: macos-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
    steps:
      - name: Checkout lot-Project repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout lot-manager-aio workspace for m1-3-app macOS/iOS
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch m1-3-app macOS/iOS workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Rust for m1-3-app macOS/iOS
        uses: dtolnay/rust-toolchain@stable

      - name: Add Apple targets for m1-3-app macOS/iOS
        shell: bash
        run: rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Download shared frontend tauri assets for m1-3-app macOS/iOS
        uses: actions/download-artifact@v4
        with:
          name: frontend-tauri-dist
          path: workspace/m1-3-app/dist

      - name: Build m1-3-app macOS .dmg
        working-directory: workspace/m1-3-app
        shell: bash
        env:
          LOT_SKIP_FRONTEND_BUILD: "true"
        run: |
          set -euo pipefail
          cargo install tauri-cli --version "^2" --locked || true
          cargo tauri build --bundles dmg

      - name: Initialize m1-3-app iOS project
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          cargo install tauri-cli --version "^2" --locked || true
          cargo tauri ios init --ci --skip-targets-install

      - name: Copy m1-3-app bridge templates to iOS project
        working-directory: workspace/m1-3-app
        shell: bash
        run: python3 ../script/m1-3/copy-mobile-bridges.py ios

      - name: Build m1-3-app iOS simulator app
        working-directory: workspace/m1-3-app
        shell: bash
        env:
          LOT_SKIP_FRONTEND_BUILD: "true"
        run: cargo tauri ios build --target aarch64-sim --ci

      - name: Package m1-3-app iOS simulator .app.ipa artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          app_path="$(find workspace/m1-3-app/gen/apple/build -type d -name '*.app' | head -1)"
          test -n "${app_path}"
          cp -R "${app_path}" /tmp/release/
          app_name="$(basename "${app_path}")"
          base_name="${app_name%.app}"
          ditto -c -k --keepParent "${app_path}" "/tmp/release/${base_name}-ios-simulator.app.ipa"

      - name: Upload m1-3-app macOS/iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-apple
          path: |
            workspace/target/release/bundle/**/*.dmg
            /tmp/release/*-ios-simulator.app.ipa
          if-no-files-found: warn

      - name: Upload m1-3-app macOS/iOS artifacts to private release
        if: ${{ github.event.inputs.publish_release != 'false' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GH }}
        run: |
          set -euo pipefail
          release_tag="${{ github.event.inputs.release_tag }}"
          files=()
          while IFS= read -r file; do
            files+=("${file}")
          done < <(
            {
              find workspace/target/release/bundle -type f -name '*.dmg' 2>/dev/null
              find /tmp/release -maxdepth 1 -type f -name '*-ios-simulator.app.ipa' 2>/dev/null
            } | sort
          )
          ((${#files[@]} > 0))
          if ! gh release view "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" >/dev/null 2>&1; then
            if [[ "${{ github.event.inputs.prerelease }}" == 'true' ]]; then
              gh release create "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" --title "${release_tag}" --prerelease --notes ""
            else
              gh release create "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" --title "${release_tag}" --notes ""
            fi
          fi
          gh release upload "${release_tag}" "${files[@]}" -R "${PRIVATE_RELEASE_REPO}" --clobber

  build-android:
    name: Build m1-3-app Android (.apk)
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'm1-3-app' || github.event.inputs.build_target == 'm1-3-app-android' || github.event.inputs.build_target == '' }}
    needs:
      - prepare-private-release
      - prepare-shared-frontend-assets
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
    steps:
      - name: Checkout lot-Project repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout lot-manager-aio workspace for m1-3-app Android
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch m1-3-app Android workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Rust for m1-3-app Android
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java for m1-3-app Android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK for m1-3-app
        uses: android-actions/setup-android@v3

      - name: Add Android Rust targets for m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          rustup target add aarch64-linux-android x86_64-linux-android armv7-linux-androideabi
          cargo install tauri-cli --version "^2" --locked || true

      - name: Install Android NDK for m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install "ndk;27.0.12077973" --channel=0
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Download shared frontend tauri assets for m1-3-app Android
        uses: actions/download-artifact@v4
        with:
          name: frontend-tauri-dist
          path: workspace/m1-3-app/dist

      - name: Initialize m1-3-app Android project
        working-directory: workspace/m1-3-app
        shell: bash
        run: cargo tauri android init --ci --skip-targets-install

      - name: Copy m1-3-app Android bridges
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          python3 ../script/m1-3/copy-mobile-bridges.py android

      - name: Build m1-3-app Android APK
        working-directory: workspace/m1-3-app
        shell: bash
        env:
          LOT_SKIP_FRONTEND_BUILD: "true"
        run: cargo tauri android build --target aarch64 --apk

      - name: Sign m1-3-app Android APK
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          unsigned_apk="$(find gen/android -type f -name '*-unsigned.apk' | head -1)"
          test -n "${unsigned_apk}"
          props_file="signing/android/release-signing.properties"
          test -f "${props_file}"
          keystore_rel="$(grep '^storeFile=' "${props_file}" | cut -d= -f2-)"
          store_password="$(grep '^storePassword=' "${props_file}" | cut -d= -f2-)"
          key_alias="$(grep '^keyAlias=' "${props_file}" | cut -d= -f2-)"
          key_password="$(grep '^keyPassword=' "${props_file}" | cut -d= -f2-)"
          keystore_path="${keystore_rel}"
          if [[ ! -f "${keystore_path}" ]]; then
            keystore_path="$(basename "${keystore_rel}")"
            keystore_path="signing/android/${keystore_path}"
          fi
          test -f "${keystore_path}"
          signed_apk="${unsigned_apk/-unsigned.apk/.apk}"
          build_tools_dir="$(find "${ANDROID_HOME}/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1)"
          test -n "${build_tools_dir}"
          "${build_tools_dir}/apksigner" sign \
            --ks "${keystore_path}" \
            --ks-key-alias "${key_alias}" \
            --ks-pass "pass:${store_password}" \
            --key-pass "pass:${key_password}" \
            --out "${signed_apk}" \
            "${unsigned_apk}"
          "${build_tools_dir}/apksigner" verify "${signed_apk}"

      - name: Upload m1-3-app Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-android
          path: |
            workspace/m1-3-app/gen/android/**/*.apk
            !workspace/m1-3-app/gen/android/**/*-unsigned.apk
          if-no-files-found: warn

      - name: Upload m1-3-app Android artifacts to private release
        if: ${{ github.event.inputs.publish_release != 'false' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GH }}
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          release_tag="${{ github.event.inputs.release_tag }}"
          files=()
          while IFS= read -r file; do
            files+=("${file}")
          done < <(find workspace/m1-3-app/gen/android -type f -name '*.apk' ! -name '*-unsigned.apk' | sort)
          ((${#files[@]} > 0))
          if ! gh release view "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" >/dev/null 2>&1; then
            if [[ "${{ github.event.inputs.prerelease }}" == 'true' ]]; then
              gh release create "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" --title "${release_tag}" --prerelease --notes ""
            else
              gh release create "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" --title "${release_tag}" --notes ""
            fi
          fi
          gh release upload "${release_tag}" "${files[@]}" -R "${PRIVATE_RELEASE_REPO}" --clobber

  build-m1-2-device-init-reg-proxy-linux-x86_64:
    name: Build m1-2-device-init-reg-proxy Linux x86_64 .gz
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'm1-2-device-init-reg-proxy-linux' || github.event.inputs.build_target == 'm1-2-device-init-reg-proxy-linux-x86_64' || github.event.inputs.build_target == '' }}
    needs: prepare-private-release
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
      OUTPUT_NAME: m1-2-device-init-reg-proxy-x86_64-unknown-linux-gnu
    steps:
      - name: Checkout lot-Project repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout lot-manager-aio workspace for m1-2-device-init-reg-proxy x86_64
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch m1-2-device-init-reg-proxy x86_64 workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

