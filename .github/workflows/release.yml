name: Release

on:
  repository_dispatch:
    types: [release-build]
  workflow_dispatch:
    inputs:
      build_target:
        description: 构建目标
        default: all
        type: choice
        options:
          - all
          - lot-manager-aio-docker
          - lot-manager-aio-x86_64-gnu-docker
          - lot-manager-aio-aarch64-musl-docker
          - m1-1-platform-rs
          - m2-1-listener
          - m2-2-telemetry-tracking-and-archive
          - m4-1-inlet-manager
          - m4-2-device-init-reg-proxy
          - m3-v1-esp32c3-classicsimple-firmware
      publish_release:
        description: 是否发布到 release
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      release_tag:
        description: 发布 tag（如 v0.1.0）       
        default: 'v0.1.0'
        required: true
        type: string
      source_ref:
        description: 源码 ref（如 v0.1.0 或 main）
        required: true      
        default: 'main'
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.client_payload.release_tag || '' }}
  cancel-in-progress: true

env:
  PRIVATE_RELEASE_REPO: joyanhui/lot-manager-aio
  # 归一化 inputs，兼容 repository_dispatch(client_payload) 和 workflow_dispatch(inputs)
  BUILD_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.build_target || github.event.client_payload.build_target || 'all' }}
  PUBLISH_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release || github.event.client_payload.publish_release || 'true' }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.client_payload.release_tag || '' }}
  SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.event.client_payload.source_ref || 'main' }}

jobs:
  prepare-private-release:
    name: Prepare private lot-manager-aio release
    runs-on: ubuntu-latest
    steps:
      - name: Ensure private release exists when publishing
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GH }}
        run: |
          set -euo pipefail
          release_tag="${{ env.RELEASE_TAG }}"
          if gh release view "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" >/dev/null 2>&1; then
            exit 0
          fi
          gh release create "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" --title "${release_tag}" --notes "" || gh release view "${release_tag}" -R "${PRIVATE_RELEASE_REPO}" >/dev/null 2>&1

  prepare-shared-frontend-assets:
    name: Build shared frontend assets for m1-1-platform and m1-3-app
    if: ${{ contains(fromJSON('["all","m1-1-platform-rs-linux","m1-1-platform-rs-linux-x86_64","m1-1-platform-rs-linux-arm64-musl","m1-3-app","m1-3-app-android","m1-3-app-desktop"]'), github.event_name == 'workflow_dispatch' && inputs.build_target || github.event.client_payload.build_target || 'all') }}
    needs: prepare-private-release
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
    steps:
      - name: Checkout lot-manager-aio workspace for shared frontend assets
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch shared frontend workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Bun for shared frontend assets
        uses: oven-sh/setup-bun@v2

      - name: Install workspace dependencies for shared frontend assets
        working-directory: workspace
        shell: bash
        run: bun install

      - name: Build shared frontend web assets for m1-1-platform
        working-directory: workspace/frontend
        shell: bash
        run: bun run build:web

      - name: Build shared frontend tauri assets for m1-3-app
        working-directory: workspace/frontend
        shell: bash
        run: bun run build:tauri

      - name: Upload shared frontend web assets for m1-1-platform
        uses: actions/upload-artifact@v4
        with:
          name: frontend-web-public
          path: workspace/frontend/dist-cli
          if-no-files-found: error

      - name: Upload shared frontend tauri assets for m1-3-app
        uses: actions/upload-artifact@v4
        with:
          name: frontend-tauri-dist
          path: workspace/frontend/dist-tauri
          if-no-files-found: error

  build-linux:
    name: Build m1-3-app Linux x86_64 binary
    if: ${{ contains(fromJSON('["all","m1-3-app","m1-3-app-desktop"]'), github.event_name == 'workflow_dispatch' && inputs.build_target || github.event.client_payload.build_target || 'all') }}
    needs:
      - prepare-private-release
      - prepare-shared-frontend-assets
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
    steps:
      - name: Checkout lot-Project repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout lot-manager-aio workspace for m1-3-app Linux
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch m1-3-app Linux workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Install Linux system dependencies for m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust for m1-3-app Linux
        uses: dtolnay/rust-toolchain@stable

      - name: Download shared frontend tauri assets for m1-3-app Linux
        uses: actions/download-artifact@v4
        with:
          name: frontend-tauri-dist
          path: workspace/frontend/dist-tauri

      - name: Build m1-3-app Linux x86_64 binary
        working-directory: workspace/m1-3-app
        shell: bash
        env:
          LOT_SKIP_FRONTEND_BUILD: "true"
        run: |
          set -euo pipefail
          cargo install tauri-cli --version "^2" --locked || true
          cargo tauri build --no-bundle

      - name: Collect m1-3-app Linux x86_64 binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          binary_path="workspace/target/release/lot-manager-m1-3-app"
          output_name="m1-3-app-linux-x86_64"
          test -f "${binary_path}"
          gzip -c "${binary_path}" > "/tmp/release/${output_name}.gz"

      - name: Upload m1-3-app Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-linux
          path: |
            /tmp/release/m1-3-app-linux-x86_64.gz
          if-no-files-found: warn

      - name: Upload m1-3-app Linux artifacts to private release
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GH }}
        run: |
          set -euo pipefail
          release_tag="${{ env.RELEASE_TAG }}"
          bash workspace/script/ci/gh-release.sh upload \
            "${release_tag}" \
            "${PRIVATE_RELEASE_REPO}" \
            /tmp/release/m1-3-app-linux-x86_64.gz

  build-windows:
    name: Build m1-3-app Windows (.msi)
    if: ${{ contains(fromJSON('["all","m1-3-app","m1-3-app-desktop"]'), github.event_name == 'workflow_dispatch' && inputs.build_target || github.event.client_payload.build_target || 'all') }}
    needs:
      - prepare-private-release
      - prepare-shared-frontend-assets
    runs-on: windows-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
    steps:
      - name: Checkout lot-Project repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout lot-manager-aio workspace for m1-3-app Windows
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch m1-3-app Windows workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Rust for m1-3-app Windows
        uses: dtolnay/rust-toolchain@stable

      - name: Download shared frontend tauri assets for m1-3-app Windows
        uses: actions/download-artifact@v4
        with:
          name: frontend-tauri-dist
          path: workspace/frontend/dist-tauri

      - name: Build m1-3-app Windows .msi
        working-directory: workspace/m1-3-app
        shell: bash
        env:
          LOT_SKIP_FRONTEND_BUILD: "true"
        run: |
          set -euo pipefail
          cargo install tauri-cli --version "^2" --locked || true
          cargo tauri build --bundles msi

      - name: Collect m1-3-app Windows .msi artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          msi_path="$(find workspace/target/release/bundle -type f -name '*.msi' | head -1)"
          test -n "${msi_path}"
          cp "${msi_path}" /tmp/release/m1-3-app-windows-x64.msi

      - name: Upload m1-3-app Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-windows
          path: |
            /tmp/release/m1-3-app-windows-x64.msi
          if-no-files-found: warn

      - name: Upload m1-3-app Windows artifacts to private release
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GH }}
        run: |
          set -euo pipefail
          release_tag="${{ env.RELEASE_TAG }}"
          bash workspace/script/ci/gh-release.sh upload \
            "${release_tag}" \
            "${PRIVATE_RELEASE_REPO}" \
            /tmp/release/m1-3-app-windows-x64.msi

  build-macos:
    name: Build m1-3-app macOS .dmg + iOS simulator .app.ipa
    if: ${{ contains(fromJSON('["all","m1-3-app","m1-3-app-desktop"]'), github.event_name == 'workflow_dispatch' && inputs.build_target || github.event.client_payload.build_target || 'all') }}
    needs:
      - prepare-private-release
      - prepare-shared-frontend-assets
    runs-on: macos-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
    steps:
      - name: Checkout lot-Project repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout lot-manager-aio workspace for m1-3-app macOS/iOS
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch m1-3-app macOS/iOS workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Rust for m1-3-app macOS/iOS
        uses: dtolnay/rust-toolchain@stable

      - name: Add Apple targets for m1-3-app macOS/iOS
        shell: bash
        run: rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Download shared frontend tauri assets for m1-3-app macOS/iOS
        uses: actions/download-artifact@v4
        with:
          name: frontend-tauri-dist
          path: workspace/frontend/dist-tauri

      - name: Build m1-3-app macOS .dmg
        working-directory: workspace/m1-3-app
        shell: bash
        env:
          LOT_SKIP_FRONTEND_BUILD: "true"
        run: |
          set -euo pipefail
          cargo install tauri-cli --version "^2" --locked || true
          cargo tauri build --bundles dmg

      - name: Initialize m1-3-app iOS project
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          cargo install tauri-cli --version "^2" --locked || true
          cargo tauri ios init --ci --skip-targets-install

      - name: Copy m1-3-app bridge templates to iOS project
        working-directory: workspace/m1-3-app
        shell: bash
        run: python3 ../script/m1-3/copy-mobile-bridges.py ios

      - name: Build m1-3-app iOS simulator app
        working-directory: workspace/m1-3-app
        shell: bash
        env:
          LOT_SKIP_FRONTEND_BUILD: "true"
        run: cargo tauri ios build --target aarch64-sim --ci

      - name: Package m1-3-app iOS simulator .app.ipa artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          dmg_path="$(find workspace/target/release/bundle -type f -name '*.dmg' | head -1)"
          test -n "${dmg_path}"
          cp "${dmg_path}" /tmp/release/m1-3-app-macos.dmg
          app_path="$(find workspace/m1-3-app/gen/apple/build -type d -name '*.app' | head -1)"
          test -n "${app_path}"
          cp -R "${app_path}" /tmp/release/
          ditto -c -k --keepParent "${app_path}" "/tmp/release/m1-3-app-ios-simulator.app.ipa"

      - name: Upload m1-3-app macOS/iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-apple
          path: |
            /tmp/release/m1-3-app-macos.dmg
            /tmp/release/m1-3-app-ios-simulator.app.ipa
          if-no-files-found: warn

      - name: Upload m1-3-app macOS/iOS artifacts to private release
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GH }}
        run: |
          set -euo pipefail
          release_tag="${{ env.RELEASE_TAG }}"
          files=()
          while IFS= read -r file; do
            files+=("${file}")
          done < <(
            {
              find /tmp/release -maxdepth 1 -type f -name 'm1-3-app-macos.dmg' 2>/dev/null
              find /tmp/release -maxdepth 1 -type f -name 'm1-3-app-ios-simulator.app.ipa' 2>/dev/null
            } | sort
          )
          ((${#files[@]} > 0))
          bash workspace/script/ci/gh-release.sh upload \
            "${release_tag}" \
            "${PRIVATE_RELEASE_REPO}" \
            "${files[@]}"

  build-android:
    name: Build m1-3-app Android (.apk)
    if: ${{ contains(fromJSON('["all","m1-3-app","m1-3-app-android"]'), github.event_name == 'workflow_dispatch' && inputs.build_target || github.event.client_payload.build_target || 'all') }}
    needs:
      - prepare-private-release
      - prepare-shared-frontend-assets
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
    steps:
      - name: Checkout lot-Project repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout lot-manager-aio workspace for m1-3-app Android
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch m1-3-app Android workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Rust for m1-3-app Android
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java for m1-3-app Android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK for m1-3-app
        uses: android-actions/setup-android@v3

      - name: Add Android Rust targets for m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          rustup target add aarch64-linux-android x86_64-linux-android armv7-linux-androideabi
          cargo install tauri-cli --version "^2" --locked || true

      - name: Install Android NDK for m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install "ndk;27.0.12077973" --channel=0
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Download shared frontend tauri assets for m1-3-app Android
        uses: actions/download-artifact@v4
        with:
          name: frontend-tauri-dist
          path: workspace/frontend/dist-tauri

      - name: Initialize m1-3-app Android project
        working-directory: workspace/m1-3-app
        shell: bash
        run: cargo tauri android init --ci --skip-targets-install

      - name: Copy m1-3-app Android bridges
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          python3 ../script/m1-3/copy-mobile-bridges.py android

      - name: Build m1-3-app Android universal APK and AAB
        working-directory: workspace/m1-3-app
        shell: bash
        env:
          LOT_SKIP_FRONTEND_BUILD: "true"
        run: cargo tauri android build --target aarch64 armv7 x86_64 --apk --aab

      - name: Build m1-3-app Android split APKs
        working-directory: workspace/m1-3-app
        shell: bash
        env:
          LOT_SKIP_FRONTEND_BUILD: "true"
        run: cargo tauri android build --target aarch64 armv7 x86_64 --apk --split-per-abi

      - name: Sign m1-3-app Android APK
        working-directory: workspace/m1-3-app
        shell: bash
        run: |
          set -euo pipefail
          props_file="signing/android/release-signing.properties"
          test -f "${props_file}"
          keystore_rel="$(grep '^storeFile=' "${props_file}" | cut -d= -f2-)"
          store_password="$(grep '^storePassword=' "${props_file}" | cut -d= -f2-)"
          key_alias="$(grep '^keyAlias=' "${props_file}" | cut -d= -f2-)"
          key_password="$(grep '^keyPassword=' "${props_file}" | cut -d= -f2-)"
          keystore_path="${keystore_rel}"
          if [[ ! -f "${keystore_path}" ]]; then
            keystore_path="$(basename "${keystore_rel}")"
            keystore_path="signing/android/${keystore_path}"
          fi
          test -f "${keystore_path}"
          build_tools_dir="$(find "${ANDROID_HOME}/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1)"
          test -n "${build_tools_dir}"
          mkdir -p /tmp/release/android

          while IFS= read -r unsigned_apk; do
            signed_apk="${unsigned_apk/-unsigned.apk/.apk}"
            "${build_tools_dir}/apksigner" sign \
              --ks "${keystore_path}" \
              --ks-key-alias "${key_alias}" \
              --ks-pass "pass:${store_password}" \
              --key-pass "pass:${key_password}" \
              --out "${signed_apk}" \
              "${unsigned_apk}"
            "${build_tools_dir}/apksigner" verify "${signed_apk}"

            case "$(basename "${signed_apk}")" in
              *universal*.apk)
                cp "${signed_apk}" /tmp/release/android/m1-3-app-android-universal.apk
                ;;
              *arm64-v8a*.apk|*aarch64*.apk|*arm64*.apk)
                cp "${signed_apk}" /tmp/release/android/m1-3-app-android-arm64-v8a.apk
                ;;
              *armeabi-v7a*.apk|*armv7*.apk|*arm-release*.apk)
                cp "${signed_apk}" /tmp/release/android/m1-3-app-android-armeabi-v7a.apk
                ;;
              *x86_64*.apk)
                cp "${signed_apk}" /tmp/release/android/m1-3-app-android-x86_64.apk
                ;;
            esac
          done < <(find gen/android -type f -name '*-unsigned.apk' | sort)

          unsigned_aab="$(find gen/android -type f -name '*.aab' | head -1)"
          test -n "${unsigned_aab}"
          signed_aab="/tmp/release/android/m1-3-app-android.aab"
          jarsigner \
            -keystore "${keystore_path}" \
            -storepass "${store_password}" \
            -keypass "${key_password}" \
            -signedjar "${signed_aab}" \
            "${unsigned_aab}" \
            "${key_alias}"

      - name: Upload m1-3-app Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m1-3-app-android
          path: |
            /tmp/release/android/*
          if-no-files-found: warn

      - name: Upload m1-3-app Android artifacts to private release
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GH }}
        run: |
          set -euo pipefail
          release_tag="${{ env.RELEASE_TAG }}"
          bash workspace/script/ci/gh-release.sh upload \
            "${release_tag}" \
            "${PRIVATE_RELEASE_REPO}" \
            /tmp/release/android/*

  build-m4-2-device-init-reg-proxy-linux-x86_64:
    name: Build m4-2-device-init-reg-proxy Linux x86_64 .gz
    if: ${{ contains(fromJSON('["all","m4-2-device-init-reg-proxy-linux","m4-2-device-init-reg-proxy-linux-x86_64"]'), github.event_name == 'workflow_dispatch' && inputs.build_target || github.event.client_payload.build_target || 'all') }}
    needs: prepare-private-release
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
      OUTPUT_NAME: m4-2-device-init-reg-proxy-linux-x86_64
    steps:
      - name: Checkout lot-Project repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout lot-manager-aio workspace for m4-2-device-init-reg-proxy x86_64
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch m4-2-device-init-reg-proxy x86_64 workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Rust for m4-2-device-init-reg-proxy x86_64
        uses: dtolnay/rust-toolchain@stable

      - name: Build m4-2-device-init-reg-proxy Linux x86_64 binary
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release -p m4-2-device-init-reg-proxy --target "${TARGET_TRIPLE}"

      - name: Collect m4-2-device-init-reg-proxy x86_64 .gz artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          binary_path="workspace/target/${TARGET_TRIPLE}/release/m4-2-device-init-reg-proxy"
