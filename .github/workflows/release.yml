  build-esp32c3-classicsimple-firmware:
    name: Build m3-v1 esp32c3-classicsimple firmware
    if: ${{ contains(fromJSON('["all","m3-v1-esp32c3-classicsimple-firmware"]'), github.event_name == 'workflow_dispatch' && inputs.build_target || github.event.client_payload.build_target || 'all') }}
    needs: prepare-private-release
    runs-on: ubuntu-latest
    env:
      TOKEN_GH: ${{ secrets.TOKEN_GH }}
      OUTPUT_NAME: M3-v1-esp32c3-classicsimple-firmware.elf
    steps:
      - name: Checkout lot-Project repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout lot-manager-aio workspace for m3-v1 esp32c3-classicsimple
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_RELEASE_REPO }}
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch m3-v1 esp32c3-classicsimple workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Rust nightly for m3-v1 esp32c3-classicsimple
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-08
          components: rust-src

      - name: Install ldproxy for m3-v1 esp32c3-classicsimple
        shell: bash
        run: cargo install ldproxy --locked

      - name: Install ESP-IDF system dependencies for m3-v1 esp32c3-classicsimple
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git \
            wget \
            flex \
            bison \
            gperf \
            python3 \
            python3-pip \
            python3-venv \
            cmake \
            ninja-build \
            ccache \
            libffi-dev \
            libssl-dev \
            dfu-util \
            libusb-1.0-0

      - name: Prepare m3-v1 esp32c3-classicsimple firmware config
        working-directory: workspace/m3-v1
        shell: bash
        run: |
          set -euo pipefail
          source ../script/export-esp.sh
          bash ../script/prepare-m3-sdkconfig.sh
          cp sdkconfig.defaults sdkconfig

      - name: Build m3-v1 esp32c3-classicsimple firmware ELF
        working-directory: workspace/m3-v1
        shell: bash
        run: |
          set -euo pipefail
          source ../script/export-esp.sh
          cp sdkconfig.defaults sdkconfig
          env \
            -u RUSTFLAGS \
            -u CARGO_ENCODED_RUSTFLAGS \
            -u CARGO_PROFILE_DEV_SPLIT_DEBUGINFO \
            -u CARGO_PROFILE_RELEASE_SPLIT_DEBUGINFO \
            ESP_IDF_SDKCONFIG="$PWD/sdkconfig" \
            ESP_IDF_SDKCONFIG_DEFAULTS="$PWD/sdkconfig.defaults" \
            ESP_IDF_TOOLS_INSTALL_DIR="custom:$PWD/.embuild/espressif" \
            cargo build \
              --release \
              --package lot-manager-m3-firmware \
              --bin lot-manager-m3-firmware-esp32c3 \
              --features esp32c3 \
              --target riscv32imc-esp-espidf

      - name: Collect m3-v1 esp32c3-classicsimple firmware artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          firmware_path="workspace/target/riscv32imc-esp-espidf/release/lot-manager-m3-firmware-esp32c3"
          if [[ ! -f "${firmware_path}" ]]; then
            firmware_path="workspace/m3-v1/target/riscv32imc-esp-espidf/release/lot-manager-m3-firmware-esp32c3"
          fi
          test -f "${firmware_path}"
          partition_table_path="workspace/target/riscv32imc-esp-espidf/release/partition-table.bin"
          if [[ ! -f "${partition_table_path}" ]]; then
            partition_table_path="workspace/m3-v1/target/riscv32imc-esp-espidf/release/partition-table.bin"
          fi
          test -f "${partition_table_path}"
          bootloader_path="workspace/target/riscv32imc-esp-espidf/release/bootloader.bin"
          if [[ ! -f "${bootloader_path}" ]]; then
            bootloader_path="workspace/m3-v1/target/riscv32imc-esp-espidf/release/bootloader.bin"
          fi
          test -f "${bootloader_path}"
          cp "${firmware_path}" "/tmp/release/${OUTPUT_NAME}"
          cp "${partition_table_path}" /tmp/release/M3-v1-esp32c3-classicsimple-partition-table.bin
          cp "${bootloader_path}" /tmp/release/M3-v1-esp32c3-classicsimple-bootloader.bin
          cp workspace/m3-v1/config.toml /tmp/release/M3-v1-esp32c3-classicsimple-config.toml.example
          cp workspace/m3-v1/sdkconfig.defaults /tmp/release/M3-v1-esp32c3-classicsimple-sdkconfig.defaults
          cp workspace/m3-v1/partitions.csv /tmp/release/M3-v1-esp32c3-classicsimple-partitions.csv

      - name: Upload m3-v1 esp32c3-classicsimple firmware artifacts to private release
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GH }}
        run: |
          set -euo pipefail
          release_tag="${{ env.RELEASE_TAG }}"
          bash workspace/script/ci/gh-release.sh upload \
            "${release_tag}" \
            "${PRIVATE_RELEASE_REPO}" \
            /tmp/release/*

  finalize-private-release-assets:
    name: Finalize private release assets
    runs-on: ubuntu-latest
    needs:
      - prepare-private-release
      - build-linux
      - build-windows
      - build-macos
      - build-android
      - prepare-shared-frontend-assets
      - build-m1-1-platform-rs-linux-x86_64
      - build-m1-1-platform-rs-linux-arm64-musl
      - build-m4-2-device-init-reg-proxy-linux-x86_64
      - build-m4-2-device-init-reg-proxy-linux-arm64-musl
      - build-m2-1-listener-linux-x86_64
      - build-m2-1-listener-linux-arm64-musl
      - build-m2-2-telemetry-tracking-and-archive-linux-x86_64
      - build-m2-2-telemetry-tracking-and-archive-linux-arm64-musl
      - build-m4-1-inlet-manager-linux-x86_64
      - build-m4-1-inlet-manager-linux-arm64-musl
      - build-esp32c3-classicsimple-firmware
      - build-lot-manager-aio-x86_64-gnu-docker
      - build-lot-manager-aio-aarch64-musl-docker
    if: ${{ always() && ((github.event_name == 'workflow_dispatch' && inputs.publish_release || github.event.client_payload.publish_release || 'true') == 'true') && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    steps:
      - name: Checkout lot-manager-aio workspace for private release finalization
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          path: workspace
          fetch-depth: 0
          token: ${{ secrets.TOKEN_GH }}

      - name: Switch private release finalization workspace to requested source ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          source_ref="${{ env.SOURCE_REF }}"
          if [[ -n "${source_ref}" ]]; then
            git fetch --all --tags --prune
            git checkout "${source_ref}"
          fi

      - name: Normalize and republish private release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GH }}
        run: |
          set -euo pipefail
          release_tag="${{ env.RELEASE_TAG }}"
          raw_dir="$(mktemp -d)"
          final_dir="$(mktemp -d)"

          bash workspace/script/ci/gh-release.sh download \
            "${release_tag}" \
            "${PRIVATE_RELEASE_REPO}" \
            "${raw_dir}"

          normalize_asset() {
            local src="$1"
            local base dest
            base="$(basename "$src")"
            dest=""

            case "$base" in
              *.sha256|SHA256SUMS.txt)
                return 0
                ;;
              m1-1-platform-rs-linux-x86_64.tar.gz)
                dest="m1-1-platform-rs-linux-x86_64.tar.gz"
                ;;
              m1-1-platform-rs-linux-arm64-musl.tar.gz)
                dest="m1-1-platform-rs-linux-arm64-musl.tar.gz"
                ;;
              m4-2-device-init-reg-proxy-linux-x86_64.gz)
                dest="m4-2-device-init-reg-proxy-linux-x86_64.gz"
                ;;
              m4-2-device-init-reg-proxy-linux-arm64-musl.gz)
                dest="m4-2-device-init-reg-proxy-linux-arm64-musl.gz"
                ;;
              m2-1-listener-linux-x86_64.gz)
                dest="m2-1-listener-linux-x86_64.gz"
                ;;
              m2-1-listener-linux-arm64-musl.gz)
                dest="m2-1-listener-linux-arm64-musl.gz"
                ;;
              m2-2-telemetry-tracking-and-archive-linux-x86_64.gz)
                dest="m2-2-telemetry-tracking-and-archive-linux-x86_64.gz"
                ;;
              m2-2-telemetry-tracking-and-archive-linux-arm64-musl.gz)
                dest="m2-2-telemetry-tracking-and-archive-linux-arm64-musl.gz"
                ;;
              m4-1-inlet-manager-linux-x86_64.gz)
                dest="m4-1-inlet-manager-linux-x86_64.gz"
                ;;
              m4-1-inlet-manager-linux-arm64-musl.gz)
                dest="m4-1-inlet-manager-linux-arm64-musl.gz"
                ;;
              m1-3-app-linux-x86_64.gz)
                dest="m1-3-app-linux-x86_64.gz"
                ;;
              M3-v1-esp32c3-classicsimple-firmware.elf)
                dest="M3-v1-esp32c3-classicsimple-firmware.elf"
                ;;
              M3-v1-esp32c3-classicsimple-bootloader.bin)
                dest="M3-v1-esp32c3-classicsimple-bootloader.bin"
                ;;
              M3-v1-esp32c3-classicsimple-partition-table.bin)
                dest="M3-v1-esp32c3-classicsimple-partition-table.bin"
                ;;
              M3-v1-esp32c3-classicsimple-config.toml.example)
                dest="M3-v1-esp32c3-classicsimple-config.toml.example"
                ;;
              M3-v1-esp32c3-classicsimple-sdkconfig.defaults)
                dest="M3-v1-esp32c3-classicsimple-sdkconfig.defaults"
                ;;
              M3-v1-esp32c3-classicsimple-partitions.csv)
                dest="M3-v1-esp32c3-classicsimple-partitions.csv"
                ;;
              m3-v1-esp32c3-classicsimple-firmware-riscv32imc-esp-espidf.elf)
                dest="M3-v1-esp32c3-classicsimple-firmware.elf"
                ;;
              partition-table.bin)
                dest="M3-v1-esp32c3-classicsimple-partition-table.bin"
                ;;
              bootloader.bin)
                dest="M3-v1-esp32c3-classicsimple-bootloader.bin"
                ;;
              config.toml.example)
                dest="M3-v1-esp32c3-classicsimple-config.toml.example"
                ;;
              sdkconfig.defaults)
                dest="M3-v1-esp32c3-classicsimple-sdkconfig.defaults"
                ;;
              partitions.csv)
                dest="M3-v1-esp32c3-classicsimple-partitions.csv"
                ;;
              *.msi)
                dest="m1-3-app-windows-x64.msi"
                ;;
              *.dmg)
                dest="m1-3-app-macos.dmg"
                ;;
              *-ios-simulator.app.ipa)
                dest="m1-3-app-ios-simulator.app.ipa"
                ;;
              *.aab)
                dest="m1-3-app-android.aab"
                ;;
              *universal*.apk)
                dest="m1-3-app-android-universal.apk"
                ;;
              *arm64-v8a*.apk|*aarch64*.apk)
                dest="m1-3-app-android-arm64-v8a.apk"
                ;;
              *armeabi-v7a*.apk|*armv7*.apk)
                dest="m1-3-app-android-armeabi-v7a.apk"
                ;;
              *x86_64*.apk)
                dest="m1-3-app-android-x86_64.apk"
                ;;
              lot-manager-aio-x86_64-gnu-docker.tar.gz)
                dest="lot-manager-aio-x86_64-gnu-docker.tar.gz"
                ;;
              lot-manager-aio-aarch64-musl-docker.tar.gz)
                dest="lot-manager-aio-aarch64-musl-docker.tar.gz"
                ;;
              *)
                echo "未识别的资产文件名: ${base}" >&2
                exit 1
                ;;
            esac

            cp -f "$src" "${final_dir}/${dest}"
          }

          while IFS= read -r file; do
            normalize_asset "${file}"
          done < <(find "${raw_dir}" -maxdepth 1 -type f | sort)

          (
            cd "${final_dir}"
            sha256sum * > SHA256SUMS.txt
          )

          while IFS= read -r asset_id; do
            bash workspace/script/ci/gh-release.sh delete-asset \
              "${PRIVATE_RELEASE_REPO}" \
              "${asset_id}"
          done < <(gh api "repos/${PRIVATE_RELEASE_REPO}/releases/tags/${release_tag}" --jq '.assets[].id')

          bash workspace/script/ci/gh-release.sh upload \
            "${release_tag}" \
            "${PRIVATE_RELEASE_REPO}" \
            "${final_dir}"/*

  # publish-release: 已删除 — 发布资产统一走 finalize-private-release-assets 上传到 lot-manager-aio
