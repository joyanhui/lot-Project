name: CI

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "要校验的 lot-manager-aio ref（分支 / tag / commit SHA）"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.inputs.source_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  verify-platform:
    runs-on: ubuntu-latest
    env:
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
    steps:
      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch private workspace to requested ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: workspace
        shell: bash
        run: bun install --frozen-lockfile

      - name: Run platform verification
        working-directory: workspace
        shell: bash
        run: bun run verify

  verify-rust:
    runs-on: ubuntu-latest
    env:
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
    steps:
      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch private workspace to requested ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies for Tauri check
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Validate workspace metadata
        working-directory: workspace
        shell: bash
        run: cargo metadata --format-version 1 --no-deps

      - name: Run shared and backend tests
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          env -u CARGO_INCREMENTAL cargo test -p lot-rust-shared -p m2-1-listener -p m2-2-saver

      - name: Run firmware host tests
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          env -u CARGO_INCREMENTAL cargo test -p lot-manager-m3-firmware --target x86_64-unknown-linux-gnu

      - name: Check Tauri shell crate
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          env -u CARGO_INCREMENTAL cargo check -p lot-manager-m1-3-app

      - name: Check firmware host-sim workspace path
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          env -u CARGO_INCREMENTAL cargo check -p lot-manager-m3-firmware --target x86_64-unknown-linux-gnu --no-default-features --features host-sim,esp32c3
