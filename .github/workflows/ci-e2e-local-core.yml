name: CI E2E Local Core

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "要校验的 lot-manager-aio ref（分支 / tag / commit SHA）"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: ci-e2e-local-core-${{ github.event.inputs.source_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
      M3_DEV_SHADOW_BASE_URL: http://127.0.0.1:19311
      DEVICE_INIT_PUBLIC_BASE_URL: http://127.0.0.1:19311
      DEVICE_CONTROL_PUBLIC_BASE_URL: http://127.0.0.1:19332
    steps:
      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch private workspace to requested ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lot-rust-host
          workspaces: |
            workspace -> target

      - name: Install dependencies
        working-directory: workspace
        shell: bash
        run: bun install --frozen-lockfile

      - name: Install Linux dependencies for Tauri-related checks
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Prebuild frontend and Rust runtime artifacts
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          bun run --filter @lot-manager/m1-frontend build:web
          env -u CARGO_INCREMENTAL RUSTC_WRAPPER= CARGO_BUILD_JOBS=1 \
            cargo build \
            -p m2-2-telemetry-tracking-and-archive
          (
            cd m3-v1
            env -u CARGO_INCREMENTAL RUSTC_WRAPPER= CARGO_BUILD_JOBS=1 \
              cargo build --target x86_64-unknown-linux-gnu --no-default-features --features host-sim,esp32c3
          )

      - name: Run local core E2E
        working-directory: workspace
        shell: bash
        env:
          LOT_E2E_SKIP_PREBUILD: "true"
        run: bun run test:e2e:local:core

      - name: Run local runtime edge checks
        working-directory: workspace
        shell: bash
        run: bun run test:e2e:local:runtime-edge

      - name: Run shared service crypto checks
        working-directory: workspace
        shell: bash
        run: bun run test:e2e:local:service-crypto

      - name: Run local runtime more checks
        working-directory: workspace
        shell: bash
        run: bun run test:e2e:local:runtime-more
