name: CI M1-1 Platform

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "要校验的 lot-manager-aio ref（分支 / tag / commit SHA）"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: ci-m1-1-platform-${{ github.event.inputs.source_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      SOURCE_REF: ${{ github.event.inputs.source_ref }}
    steps:
      - name: Checkout private workspace
        uses: actions/checkout@v4
        with:
          repository: joyanhui/lot-manager-aio
          ref: main
          token: ${{ secrets.TOKEN_GH }}
          path: workspace
          fetch-depth: 0

      - name: Switch private workspace to requested ref
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify --quiet "${SOURCE_REF}^{commit}" >/dev/null; then
            git fetch origin "${SOURCE_REF}" --tags --force || git fetch origin --tags --force
          fi
          git checkout --detach "${SOURCE_REF}" || git checkout --detach "origin/${SOURCE_REF}"

      - name: Setup Bun
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: workspace
        shell: bash
        run: bun install --frozen-lockfile

      - name: Typecheck shared and platform
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          bun run --filter @lot-manager/shared typecheck
          bun run --filter @lot-manager/m1-frontend typecheck
          bun run --filter @lot-manager/m1-1-platform typecheck

      - name: Build worker bundle
        working-directory: workspace
        shell: bash
        run: bun run --filter @lot-manager/m1-1-platform build:cf

      - name: Run deploy dry-run
        working-directory: workspace
        shell: bash
        run: bun run --filter @lot-manager/m1-1-platform deploy:dry-run

      - name: Run platform tests
        working-directory: workspace
        shell: bash
        run: bun run --filter @lot-manager/m1-1-platform test
